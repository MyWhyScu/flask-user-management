{% extends "base.html" %}

{% block content %}
{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <h3>用户信息</h3>
        <ul class="info-list">
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
            <li><span class="info-label">手机：</span>{{ user.phone }}</li>
            <li><span class="info-label">角色：</span>{{ user.role }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>
        <form method="POST" action="/logout" style="display:inline">
            <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}">
            <button type="submit" class="btn btn-danger">退出登录</button>
        </form>
    </div>
{% else %}
    <div class="card">
        <h2>请先登录</h2>
        <p>您还没有登录，请先登录系统查看用户信息。</p>
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
