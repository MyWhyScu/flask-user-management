{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Ping 网络诊断</h2>
    <form method="POST" action="/ping" class="ping-form">
        <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}">
        <div class="form-group">
            <label for="ip">IP 地址或域名：</label>
            <input type="text" id="ip" name="ip" class="search-input" placeholder="例如：127.0.0.1 或 baidu.com" value="{{ ip }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Ping</button>
    </form>
</div>

{% if result is not none %}
<div class="card ping-result-card">
    <h3>Ping 结果</h3>
    <div class="console-box">
        <div class="console-header">$ ping -c 3 {{ ip }}</div>
        <pre class="console-output">{{ result }}</pre>
    </div>
</div>
{% endif %}
{% endblock %}
